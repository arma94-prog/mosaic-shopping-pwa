<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
    <!--
      v3 (2026-04-30, 사용자 catch — Android status bar 색 불일치):
      theme-color #0f172a → #F0EDE4 (모자이크 베이지).
      이유: Android Chrome PWA는 이 meta tag 따라 status bar 색 결정.
      vite.config.js manifest theme_color #F0EDE4와 통일 (PC 정체성 정합).
    -->
    <meta name="theme-color" content="#F0EDE4" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="모자이크" />
    <meta name="format-detection" content="telephone=no" />
    <title>모자이크 쇼핑</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
