<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
    <!-- v3 (트랙 E 3): #FAFAF7 — PC index.css --color-mosaic-bg와 정합. 브라우저 상태바 색. -->
    <meta name="theme-color" content="#FAFAF7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="모자이크" />
    <meta name="format-detection" content="telephone=no" />

    <!-- ==========================================================
         v4 (2026-05-01, SEO): 사이트 종합 메타 + 홈 기본값.
         페이지별 메타는 react-helmet-async가 override.
         (About.jsx, Privacy.jsx 안의 <Helmet> 참조.)
         ========================================================== -->

    <!-- Primary Meta Tags -->
    <title>모자이크 쇼핑 - 쿠팡 네이버 등 쇼핑몰 통합 검색 및 최저가 알림 서비스</title>
    <meta name="title" content="모자이크 쇼핑 - 쿠팡 네이버 등 쇼핑몰 통합 검색 및 최저가 알림 서비스" />
    <meta
      name="description"
      content="여러 쇼핑몰을 한 번에 검색하고, 북마크한 상품의 가격이 떨어지면 알려주는 통합 쇼핑 도우미. PC와 모바일 어디서나 동기화."
    />
    <link rel="canonical" href="https://mosaicshopping.com/" />

    <!-- Open Graph (카카오톡 / 페이스북 / 슬랙 미리보기) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="모자이크 쇼핑" />
    <meta property="og:title" content="모자이크 쇼핑" />
    <meta
      property="og:description"
      content="여러 쇼핑몰을 한 번에 검색하고, 북마크한 상품의 가격이 떨어지면 알려주는 통합 쇼핑 도우미."
    />
    <meta property="og:url" content="https://mosaicshopping.com/" />
    <meta property="og:image" content="https://mosaicshopping.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="ko_KR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="모자이크 쇼핑" />
    <meta
      name="twitter:description"
      content="여러 쇼핑몰을 한 번에 검색하고, 북마크한 상품의 가격이 떨어지면 알려주는 통합 쇼핑 도우미."
    />
    <meta name="twitter:image" content="https://mosaicshopping.com/og-image.png" />

    <!-- JSON-LD Structured Data (Google 검색 결과 풍부함) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "모자이크 쇼핑",
        "url": "https://mosaicshopping.com/",
        "description": "여러 쇼핑몰을 한 번에 검색하고, 북마크한 상품의 가격이 떨어지면 알려주는 통합 쇼핑 도우미.",
        "applicationCategory": "ShoppingApplication",
        "operatingSystem": "Web, Chrome Extension",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "KRW"
        },
        "inLanguage": "ko-KR",
        "author": {
          "@type": "Person",
          "name": "신우영"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
