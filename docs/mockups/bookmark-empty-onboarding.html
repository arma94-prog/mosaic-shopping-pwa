<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>모자이크 PWA — 북마크 빈 상태 온보딩 시안 (Variant A 확정)</title>
  <style>
    /* =====================================================
     * PC 온보딩 정합 색상 토큰 (PWA tailwind 토큰 미러)
     * v2 (사용자 피드백 반영):
     *   - 전체 폰트 컬러 #523E2F
     *   - 안내 박스 테두리 제거, head 색상 #9F7D5B
     *   - 1~4 label -1pt
     *   - 로고 20% 축소 (64 → 51)
     *   - 타이틀 본문 수정 + "북마크" 강조 제거
     * ===================================================== */
    :root {
      --bg-page: #F0EDE4;          /* 페이지 베이지 배경 */
      --line-soft: #E8E0CE;        /* 단계 사이 옅은 구분선 */
      --orange: #E8762B;           /* 모자이크 주황 (번호 동그라미) */
      --text: #523E2F;             /* 전체 폰트 컬러 (브라운 톤) */
      --notice-bg: #FFF8EE;        /* 안내 박스 옅은 크림 */
      --notice-head: #9F7D5B;      /* 안내 박스 헤더 */
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      padding: 24px 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo",
        "Malgun Gothic", system-ui, sans-serif;
      background: #E8E4D7;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .variant-label {
      font-size: 12px;
      font-weight: 700;
      color: #555;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* =====================================================
     * 모바일 프레임 (PWA 너비 가정 — 414px iPhone Pro Max)
     * ===================================================== */
    .frame {
      width: 414px;
      max-width: 100%;
      background: var(--bg-page);
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      border: 1px solid #ddd;
    }
    .frame-inner {
      padding: 32px 20px 28px;
    }

    /* =====================================================
     * 로고 (51px — 기존 64px 대비 20% 축소)
     * ===================================================== */
    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    .logo {
      width: 51px;
      height: 51px;
    }

    /* =====================================================
     * 타이틀 본문 (북마크 강조 제거, 본문 수정)
     * ===================================================== */
    .title {
      text-align: center;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.5;
      color: var(--text);
      margin: 0 0 28px;
      letter-spacing: -0.3px;
    }

    /* =====================================================
     * Step row (동그라미 번호 + 본문)
     * label: 14px → 13px (-1pt)
     * v3: 1~4 사이 구분선 제거 (사용자 피드백)
     * ===================================================== */
    .step {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 0;
    }
    .step .num {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--orange);
      color: #FFF;
      font-size: 13px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
    }
    .step .body {
      flex: 1;
      min-width: 0;
    }
    .step .body .label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.5;
      letter-spacing: -0.2px;
    }

    /* =====================================================
     * 안내 박스 (테두리 X, head 색 #9F7D5B)
     * v3: 배경색 #F1EFE8로 영역 구분 (사용자 피드백)
     * ===================================================== */
    .notice {
      margin-top: 24px;
      padding: 14px 16px;
      background: #F1EFE8;
      border-radius: 12px;
      font-size: 12.5px;
      line-height: 1.6;
      color: var(--text);
    }
    .notice .head {
      font-weight: 700;
      color: var(--notice-head);
      margin-bottom: 4px;
      font-size: 12.5px;
    }
  </style>
</head>
<body>

<div class="variant-label">Variant A 확정 — PWA 북마크 빈 상태 온보딩</div>

<div class="frame">
  <div class="frame-inner">
    <div class="logo-wrap">
      <svg class="logo" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg" aria-label="모자이크 쇼핑">
        <rect width="72" height="72" rx="12" fill="#F0EDE4"/>
        <rect x="4" y="4" width="19" height="19" rx="3" fill="#f4d443"/>
        <rect x="26" y="4" width="19" height="19" rx="3" fill="#ffffff" stroke="#e6e1d0"/>
        <rect x="49" y="4" width="19" height="19" rx="3" fill="#e8762b"/>
        <rect x="4" y="26" width="19" height="19" rx="3" fill="#ffffff" stroke="#e6e1d0"/>
        <rect x="26" y="26" width="19" height="19" rx="3" fill="#e8762b"/>
        <rect x="49" y="26" width="19" height="19" rx="3" fill="#f4d443"/>
        <rect x="4" y="49" width="19" height="19" rx="3" fill="#e8762b"/>
        <rect x="26" y="49" width="19" height="19" rx="3" fill="#f4d443"/>
        <rect x="49" y="49" width="19" height="19" rx="3" fill="#fff5e6"/>
      </svg>
    </div>

    <h2 class="title">
      PC에서 마음에 드는 상품 북마크하고,<br>
      모바일에서 바로 확인하고 주문하세요.
    </h2>

    <div class="step">
      <span class="num">1</span>
      <div class="body">
        <div class="label">PC에서 '크롬 웹스토어' 열기</div>
      </div>
    </div>
    <div class="step">
      <span class="num">2</span>
      <div class="body">
        <div class="label">"모자이크 쇼핑" 검색 및 설치</div>
      </div>
    </div>
    <div class="step">
      <span class="num">3</span>
      <div class="body">
        <div class="label">같은 구글 계정으로 로그인</div>
      </div>
    </div>
    <div class="step">
      <span class="num">4</span>
      <div class="body">
        <div class="label">PC와 북마크 동기화 진행</div>
      </div>
    </div>

    <div class="notice">
      <div class="head">★ 안내해 드립니다</div>
      현재 북마크 추가 기능은 PC 버전에서만 지원하고 있습니다.
      모바일 앱에서도 자유롭게 북마크를 추가하실 수 있도록 현재
      열심히 준비 중이니 조금만 기다려 주세요!
    </div>
  </div>
</div>

</body>
</html>
