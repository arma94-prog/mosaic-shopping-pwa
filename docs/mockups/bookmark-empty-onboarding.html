<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>모자이크 PWA — 북마크 빈 상태 온보딩 시안 (Variant A v4)</title>
  <style>
    /* =====================================================
     * v4 변경 (사용자 피드백):
     *   - 모자이크 로고 제거
     *   - 타이틀 top margin +30px
     *   - 1~4 label 왼쪽 padding +10px (들여쓰기 강화)
     *   - 안내 박스 배경 #E8E2D6
     *   - 안내 박스 viewport 하단 sticky (flex mt-auto)
     *   - 안내 박스 bottom margin 30px
     * ===================================================== */
    :root {
      --bg-page: #F0EDE4;
      --orange: #E8762B;
      --text: #523E2F;
      --notice-bg: #E8E2D6;
      --notice-head: #9F7D5B;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      padding: 24px 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo",
        "Malgun Gothic", system-ui, sans-serif;
      background: #D9D5C8;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .variant-label {
      font-size: 12px;
      font-weight: 700;
      color: #555;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* =====================================================
     * 모바일 프레임 — sticky 동작 시뮬레이션 위해 height 고정
     * AppShell: <main className="flex-1 overflow-y-auto"> 안에서 viewport 차지
     * ===================================================== */
    .frame {
      width: 414px;
      max-width: 100%;
      height: 760px; /* iPhone Pro Max viewport 가정 (-Header -BottomNav 추정) */
      background: var(--bg-page);
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      border: 1px solid #ddd;
    }
    .frame-inner {
      padding: 0 20px;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* =====================================================
     * v5: 타이틀 top margin 60px
     * ===================================================== */
    .title {
      text-align: center;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.5;
      color: var(--text);
      margin: 60px 0 28px;
      letter-spacing: -0.3px;
    }

    /* =====================================================
     * Step row — v5 변경:
     *   - step 전체 padding-left 50px (번호 오른쪽 이동)
     *   - align-items: center (번호 ↔ 텍스트 vertical center)
     *   - gap 5px (번호 ↔ 글자 간격)
     *   - .body padding-left 제거 (gap으로 통일)
     * ===================================================== */
    .step {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 10px 0 10px 50px;
    }
    .step .num {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--orange);
      color: #FFF;
      font-size: 13px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .step .body {
      flex: 1;
      min-width: 0;
    }
    .step .body .label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.5;
      letter-spacing: -0.2px;
    }

    /* =====================================================
     * 안내 박스 — viewport 하단 sticky (mt-auto) + mb 30px
     * 배경 #E8E2D6
     * ===================================================== */
    .notice {
      margin-top: auto; /* viewport 하단으로 push */
      margin-bottom: 30px;
      padding: 14px 16px;
      background: var(--notice-bg);
      border-radius: 12px;
      font-size: 12.5px;
      line-height: 1.6;
      color: var(--text);
    }
    .notice .head {
      font-weight: 700;
      color: var(--notice-head);
      margin-bottom: 4px;
      font-size: 12.5px;
    }
  </style>
</head>
<body>

<div class="variant-label">Variant A v4 — 로고 제거 + sticky 안내 박스</div>

<div class="frame">
  <div class="frame-inner">
    <h2 class="title">
      PC에서 마음에 드는 상품 북마크하고,<br>
      모바일에서 바로 확인하고 주문하세요.
    </h2>

    <div class="step">
      <span class="num">1</span>
      <div class="body">
        <div class="label">PC에서 '크롬 웹스토어' 열기</div>
      </div>
    </div>
    <div class="step">
      <span class="num">2</span>
      <div class="body">
        <div class="label">"모자이크 쇼핑" 검색 및 설치</div>
      </div>
    </div>
    <div class="step">
      <span class="num">3</span>
      <div class="body">
        <div class="label">같은 구글 계정으로 로그인</div>
      </div>
    </div>
    <div class="step">
      <span class="num">4</span>
      <div class="body">
        <div class="label">PC와 북마크 동기화 진행</div>
      </div>
    </div>

    <div class="notice">
      <div class="head">★ 안내해 드립니다</div>
      현재 북마크 추가 기능은 PC 버전에서만 지원하고 있습니다. 모바일 앱에서도
      자유롭게 북마크를 추가하실 수 있도록 현재 열심히 준비 중이니 조금만 기다려 주세요!
    </div>
  </div>
</div>

</body>
</html>
